# EN17.7 — PIVOT API Gateway (nginx OSS) — DEV VARIANT (HTTP only, no TLS)
#
# ⚠️  DEV ONLY — do not use in production. ⚠️
# This file is plain HTTP on :80, with no `ssl_*` directives and no cert
# mounts. It exists because the production `nginx.conf` (packaged in the
# Docker image) requires TLS certificates (`/etc/ssl/certs/pivot.crt`,
# `/etc/ssl/private/pivot.key`) that are not available in local dev, and
# redirects all :80 traffic to :443 — both of which make the app
# unreachable when no certs are mounted and :443 isn't published.
#
# This file is meant to be mounted by the **pivot-core dev compose**
# (`compose.yml`, `frontend` service) over `/etc/nginx/conf.d/default.conf`,
# replacing the production config at container start — it is never baked
# into the Docker image itself.
#
# The `pivot-core` hostname in the `upstream` block below is intentionally
# unchanged (matches production) — the dev compose is expected to provide a
# network alias `pivot-core` pointing at the actual dev backend service so
# name resolution succeeds without touching this file.
#
# Sibling file `nginx.conf` is the PRODUCTION version (TLS on :443, cert
# mounts, HTTP→HTTPS redirect). Keep both files' routing logic — the `map`,
# `log_format`, `upstream`, and all `location` blocks — in sync whenever one
# changes. Only the listen/TLS/redirect wrapper differs between the two.
#
# Routing strategy (longest-prefix wins for prefix locations):
# EN53 modulith — agilite & collaboratif sont des modules internes du backend unique : tout
# `/api/*` (y compris agilite/collaboratif) et leurs WebSockets sont servis par pivot-core:8080.
# Les préfixes /api/agilite/ et /api/collaboratif/ gardent des `location` distincts uniquement
# pour le WebSocket upgrade + le label de log ; leur upstream est désormais pivot-core:8080.
#   /ws/agilite/        → pivot-core:8080   (WebSocket)
#   /api/collaboratif/ws/ → pivot-core:8080 (WebSocket — STOMP whiteboard)
#   /api/agilite/       → pivot-core:8080   (REST — module agilite du modulith)
#   /api/collaboratif/  → pivot-core:8080   (REST — module collaboratif du modulith)
#   /api/               → pivot-core:8080   (REST — auth, admin, modules, account, users, teams)
#   /                   → SPA Angular (try_files)
#
# All directives are in the http context — nginx:alpine's main nginx.conf includes
# /etc/nginx/conf.d/*.conf inside its http { } block.

# ─────────────────────────────────────────────────────────────────────────────
# Module label mapping — used in the JSON access log to identify which PIVOT
# module served the request. Evaluated per request.
# ─────────────────────────────────────────────────────────────────────────────
map $uri $pivot_module {
    ~^/api/collaboratif/ws  collaboratif-ws;
    ~^/ws/agilite        agilite-ws;
    ~^/api/collaboratif  collaboratif;
    ~^/api/agilite       agilite;
    ~^/api               core;
    default              static;
}

# ─────────────────────────────────────────────────────────────────────────────
# JSON structured access log — fields parseable by any log aggregator (Loki,
# Elastic, Datadog). The `module` field allows per-module latency dashboards
# without parsing the URI in the aggregation layer.
# ─────────────────────────────────────────────────────────────────────────────
log_format json_access escape=json
    '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"upstream":"$upstream_addr",'
        '"module":"$pivot_module",'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

# ─────────────────────────────────────────────────────────────────────────────
# :80 — single dev server, plain HTTP, no redirect. Combines the health
# endpoint and the full routing/API/SPA logic that production splits across
# a :80 redirect server and a :443 TLS server.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        access_log off;
        return 200 'ok';
    }

    # Docker's embedded DNS resolver — enables per-request hostname resolution
    # for module-core services (pivot-agilite-core, pivot-collaboratif-core).
    # These repos do not exist yet; using the
    # resolver with `set $var` in each location below defers resolution to
    # request time, so nginx starts successfully even when those containers
    # are absent from the Docker network.
    #
    # If nginx runs outside Docker (bare-metal or k8s), replace 127.0.0.11
    # with your DNS server address (e.g. 1.1.1.1, or the cluster DNS ClusterIP).
    resolver 127.0.0.11 valid=30s;

    access_log /var/log/nginx/access.log json_access;

    # ── Security headers ──────────────────────────────────────────────────
    # Repeated verbatim in every child location that defines its own
    # add_header: nginx does not inherit parent-block headers into any
    # location that declares at least one add_header directive of its own.
    # Kept identical to production (including HSTS, inert over plain HTTP)
    # to minimize divergence between nginx.conf and nginx.dev.conf.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;

    # ── WebSocket — /ws/agilite/ ──────────────────────────────────────────
    location /ws/agilite/ {
        set $agilite_ws http://pivot-core:8080;
        proxy_pass $agilite_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        proxy_intercept_errors on;
        error_page 502 503 504 @module_unavailable;
    }

    # ── WebSocket — /api/collaboratif/ws/ (STOMP whiteboard) ─────────────
    # pivot-ui#157 — the collaboratif-ui client opens its STOMP socket at
    # {apiUrl}/ws/whiteboard = /api/collaboratif/ws/whiteboard (its apiUrl is
    # /api/collaboratif), and the backend registers /ws/whiteboard *under* its
    # context-path /api/collaboratif — i.e. exactly that path. Without this block
    # the request falls through to `location /api/collaboratif/` (REST), which has
    # no `proxy_http_version 1.1` + Upgrade/Connection headers, so the WebSocket
    # handshake is never upgraded → "erreur de connexion" when opening a board.
    # `^~` makes this longest-prefix match win over /api/collaboratif/. (The former
    # /ws/collaboratif/ location DID carry the upgrade headers but proxied a path the
    # backend never served — 404 — so it was dead; corrected here.)
    location ^~ /api/collaboratif/ws/ {
        set $collaboratif_ws http://pivot-core:8080;
        proxy_pass $collaboratif_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        proxy_intercept_errors on;
        error_page 502 503 504 @module_unavailable;
    }

    # ── REST — /api/agilite/ (prefix longer than /api/ — wins) ───────────
    location /api/agilite/ {
        set $agilite_rest http://pivot-core:8080;
        proxy_pass $agilite_rest;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        proxy_intercept_errors on;
        error_page 502 503 504 @module_unavailable;
    }

    # ── REST — /api/collaboratif/ ─────────────────────────────────────────
    location /api/collaboratif/ {
        set $collaboratif_rest http://pivot-core:8080;
        proxy_pass $collaboratif_rest;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        proxy_intercept_errors on;
        error_page 502 503 504 @module_unavailable;
    }

    # ── REST — /api/ (pivot-core: auth, admin, superadmin, modules, account,
    #                             users, teams — catch-all after module prefixes)
    #
    # Uses the same resolver + `set $var` dynamic-DNS pattern as the module-core
    # locations above (see the `resolver` directive's comment), not a static
    # `upstream` block as before. A static upstream resolves its server's
    # hostname once, at nginx start/reload, and nginx OSS never re-resolves it
    # afterwards: if `pivot-core` is recreated (new container, new Docker-
    # network IP) without nginx also restarting, nginx keeps proxying to the
    # stale, now-dead IP — every request under /api/, including
    # /api/auth/login, then 502s until nginx is manually reloaded. Reproduced
    # and confirmed (pivot-ui#154): `pivot-frontend` up 2 days, `pivot-core` up
    # only 17h (recreated more recently) was enough to trigger it.
    location /api/ {
        set $pivot_core_rest http://pivot-core:8080;
        proxy_pass $pivot_core_rest;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        proxy_intercept_errors on;
        error_page 502 504 @api_unavailable;
    }

    # ── Static — i18n JSON (no-cache: updated on each deploy) ────────────
    location ~* /assets/i18n/.*\.json$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        expires 0;
        try_files $uri =404;
    }

    # ── Static — JS/CSS/assets (long cache: content-hashed by Angular build)
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # ── SPA Angular — HTML5 pushState routing ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 503 error pages ───────────────────────────────────────────────────
    # @api_unavailable: pivot-core (required service) is unreachable.
    location @api_unavailable {
        default_type application/json;
        return 503 '{"status":"DOWN","service":"pivot-core"}';
    }

    # @module_unavailable: a module-core service is unreachable or not yet
    # deployed (DNS resolution failure → 502 → remapped here).
    location @module_unavailable {
        default_type application/json;
        return 503 '{"status":"DOWN"}';
    }
}
