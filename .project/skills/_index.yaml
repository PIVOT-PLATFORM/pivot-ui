skill:
  id: pivot-ui-skills-index
  version: "1.0"
  name: "Skills Index — pivot-ui"
  description: >
    Index de toutes les skills PIVOT-UI et leurs règles de chargement.
    Claude lit cet index pour déterminer quelles skills injecter dans son contexte
    avant d'implémenter une US Angular.
    Lives at .project/skills/_index.yaml

---

skills:

  # ── FRONTEND ANGULAR ─────────────────────────────────────────────────────────

  - id: pivot-angular-architecture
    file: .project/skills/skill-angular-architecture.yaml
    priority: 1
    load_when:
      agents: [Architecte_Angular, Expert_UX_UI, Dev_Agent]
      triggers:
        - "tout fichier .ts, .html ou .scss créé ou modifié"
        - "nouveau composant Angular"
        - "nouveau service Angular"
        - "nouvelle route lazy-loaded"

  - id: pivot-oidc-angular
    file: .project/skills/skill-oidc-angular.yaml
    priority: 1
    load_when:
      agents: [Expert_OIDC_IAM, Expert_Blue_Team, Dev_Agent]
      triggers:
        - "tout fichier dans auth/ ou security/"
        - "nouveau guard ou intercepteur"
        - "AC sécurité ou auth présent dans l'US"
        - "modification OIDC / token management"

  - id: pivot-module-system-angular
    file: .project/skills/skill-module-system-angular.yaml
    priority: 1
    load_when:
      agents: [Architecte_Modules, Architecte_Angular, Dev_Agent]
      triggers:
        - "tout fichier dans features/"
        - "nouvelle route lazy-loaded"
        - "nouveau guard de module"
        - "US concernant un module activable"

  - id: pivot-accessibility
    file: .project/skills/skill-accessibility.yaml
    priority: 1
    load_when:
      agents: [Expert_UX_UI, Expert_QA, Dev_Agent]
      triggers:
        - "tout nouveau composant interactif"
        - "AC A11y présent dans l'US"
        - "formulaire, modal, dropdown, toast"
        - "score Lighthouse Accessibility < 90"

  # ── QUALITÉ & TRAÇABILITÉ ────────────────────────────────────────────────────

  - id: pivot-ac-traceability
    file: .project/skills/skill-ac-traceability.yaml
    priority: 1
    load_when:
      agents: [Dev_Agent, QA_Agent, PR_Review_Agent]
      triggers:
        - "toujours — chargé pour toute implémentation d'US"
        - "calcul Gate 2"
        - "vérification traçabilité Gate 4"

  - id: pivot-testing-strategy
    file: .project/skills/skill-testing-strategy.yaml
    priority: 1
    load_when:
      agents: [Expert_QA, Dev_Agent]
      triggers:
        - "tout nouveau fichier de test Vitest ou spec Playwright"
        - "coverage < 80 %"
        - "nouvelle spec E2E"

  # ── DEVOPS & SÉCURITÉ ────────────────────────────────────────────────────────

  - id: pivot-devops-cicd
    file: .project/skills/skill-devops-cicd.yaml
    priority: 2
    load_when:
      agents: [Expert_DevSecOps, Dev_Agent]
      triggers:
        - "tout fichier .github/workflows/ créé ou modifié"
        - "Dockerfile modifié"
        - "sonar-project.properties modifié"
        - ".plumber.yaml modifié"

  - id: pivot-observability
    file: .project/skills/skill-observability.yaml
    priority: 2
    load_when:
      agents: [Expert_DevSecOps, Dev_Agent]
      triggers:
        - "nouvelle métrique ou log côté Angular"
        - "monitoring performance (Core Web Vitals)"

  # ── RGPD & CONFORMITÉ ────────────────────────────────────────────────────────

  - id: pivot-rgpd
    file: .project/skills/skill-rgpd.yaml
    priority: 2
    load_when:
      agents: [Expert_RGPD, Dev_Agent]
      triggers:
        - "US touchant email, nom, prénom ou contenu utilisateur"
        - "stockage navigateur (localStorage, cookies)"
        - "AC mentionnant consentement, cookies, RGPD"

---

loading_protocol:

  description: >
    Claude injecte les skills dans son contexte avant d'implémenter une US.
    Les skills priority 1 sont toujours chargées sur trigger.
    Les skills priority 2 sont chargées quand les triggers correspondent.

  example: |
    US 42 — Activation de module whiteboard (côté Angular)
    Target: src/app/features/whiteboard/ + src/app/core/modules/
    Skills chargées:
      - pivot-angular-architecture   # priority 1 — fichiers .ts/.html
      - pivot-oidc-angular           # priority 1 — guard auth présent
      - pivot-module-system-angular  # priority 1 — US module activable
      - pivot-accessibility          # priority 1 — composant interactif
      - pivot-ac-traceability        # priority 1 — toujours
      - pivot-testing-strategy       # priority 1 — tests requis

  skill_conflict_rule: >
    En cas de conflit entre deux skills, la plus spécifique gagne.
    pivot-oidc-angular prime sur pivot-angular-architecture pour les fichiers auth/.
    pivot-module-system-angular prime sur pivot-angular-architecture pour les fichiers features/.

  priority_levels:
    1: "Toujours chargée sur trigger — standards fondamentaux"
    2: "Chargée si trigger correspond — standards contextuels"

---

skill_update_protocol:

  rule: >
    Les skills sont des documents vivants. Quand un gate artifact documente
    un faux positif récurrent ou une règle manquante, la skill concernée
    est mise à jour dans le même PR que le fix.

  ownership: >
    Chaque skill est maintenue par l'expert le plus qualifié (voir tableau experts CLAUDE.md).
    Modifications de skills → même processus OneFlow + ACDD que tout autre code.
