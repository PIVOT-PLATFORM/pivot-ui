skill:
  id: pivot-devops-cicd
  version: "1.0"
  name: "DevOps & CI/CD PIVOT"
  description: >
    Pipeline CI/CD PIVOT, configuration des workflows GitHub Actions,
    Semantic Release, Docker GHCR. Chargé pour tout fichier .github/workflows/ modifié.
  loaded_by:
    - Expert_DevSecOps
    - Dev_Agent

---

pipeline:

  structure: |
    push / PR
        ├── 1. Qualité       Checkstyle · SpotBugs · ESLint · TypeScript
        ├── 2. Tests         JUnit + Testcontainers · Jest Angular
        ├── 3. E2E           Playwright (Chromium)
        ├── 4. SonarCloud    Quality Gate ≥ 80 % nouveau code
        ├── 5. Sécurité      Gitleaks · CodeQL · Semgrep · Plumber
        └── 6. Release       Semantic Release · Docker GHCR · SBOM · SLSA L2

    Sur main uniquement :
        ├── Mutation Testing  PIT (seuil 60 %)
        ├── Lighthouse        Perf · A11y · Best Practices · SEO
        ├── DAST Full         ZAP (ROLE_USER + ROLE_ADMIN)
        └── OpenSSF Scorecard Score /10

  rules:
    - "Séquentiel — un échec bloque les étapes suivantes"
    - "Merge sur main uniquement quand pipeline complet est vert"
    - "PR : étapes 1–5 uniquement — pas de release sur branches"

---

workflow_rules:

  security:
    - "permissions: read-all au niveau workflow"
    - "Permissions minimales par job"
    - "persist-credentials: false sur tous les checkouts sauf release.yml"
    - "timeout-minutes défini sur chaque job"
    - "Actions épinglées par SHA (enforcement via Plumber + Dependabot)"

  configs:
    location: ".github/workflows/configuration/"
    files:
      plumber: "plumber.yaml"
      sonar: "sonar-project.properties"
      gitleaks: ".gitleaks.toml"
      zap: "zap-rules.tsv"

---

semantic_release:

  rule: "Semantic Release est autoritaire pour les versions — jamais de tag git manuel"
  branch: "main uniquement"
  commit_to_release:
    "feat:": "minor"
    "fix:, perf:": "patch"
    "BREAKING CHANGE footer": "major"
    "chore:, docs:, ci:, refactor:, test:": "pas de release"

---

docker:

  rules:
    - "Multi-stage build — builder séparé du runtime"
    - "Utilisateur non-root en runtime (USER 65534)"
    - "Pas de secrets dans Dockerfile ou build args"
    - "Images scannées par Trivy avant push (CRITICAL/HIGH bloquant)"
    - "Images taguées : :latest + :{sha} + :{version-semver}"

---

gate_checklist:
  gate_2:
    - "Nouveau workflow : permissions: read-all + timeout-minutes sur chaque job"
    - "persist-credentials: false sauf release.yml"
    - "Config dans .github/workflows/configuration/ — pas en racine"
    - "Pas de secrets interpolés dans les commandes run"
    - "Semantic Release = source de vérité pour les versions"
