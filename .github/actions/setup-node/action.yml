name: Setup Node + npm
description: Configure Node.js 24 with npm dependency cache (single source of truth)

runs:
  using: composite
  steps:
    - name: Setup Node.js 24
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '24'
        cache: 'npm'

    # EN17.10 — @pivot-platform/collaboratif-ui is a real npm dependency now (GitHub Packages,
    # private registry, see .npmrc). Exported once here rather than per-workflow so every job
    # that already uses this composite action gets `npm ci` auth for free. `github.token` (==
    # secrets.GITHUB_TOKEN) is available inside composite actions without being passed in
    # explicitly — it's part of the `github` context, not the `secrets` context.
    - name: Export NODE_AUTH_TOKEN for @pivot-platform scoped installs
      shell: bash
      run: echo "NODE_AUTH_TOKEN=${{ github.token }}" >> "$GITHUB_ENV"
