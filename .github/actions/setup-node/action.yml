name: Setup Node + npm
description: Configure Node.js 24 with npm dependency cache (single source of truth)

runs:
  using: composite
  steps:
    - name: Setup Node.js 24
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '24'
        cache: 'npm'
