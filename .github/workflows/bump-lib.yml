name: Bump lib dependency (automated)

# Closes the loop so a release of @pivot-platform/collaboratif-ui, pilotage-ui or agilite-ui
# actually reaches recette: those 3 repos have no Cloud Run service of their own (they're npm
# libs bundled into this app's build, see package.json), so publishing a new version alone
# never triggers a rebuild here. Each lib repo's notify-pivot-ui.yml fires a repository_dispatch
# here on `release: published`; this workflow bumps the exact dependency version, verifies the
# build still succeeds, and pushes the commit — which re-triggers deploy-dev.yml (push:main) and
# carries the new lib code to Cloud Run through the already-working continuous-deploy pipeline.
#
# SEMANTIC_RELEASE_TOKEN (not secrets.GITHUB_TOKEN) for checkout+push: same reason as
# release.yml — a GITHUB_TOKEN-authored commit does not re-trigger downstream workflow runs
# (GitHub Actions loop-prevention), so the push here would silently never reach deploy-dev.yml.

on:
  repository_dispatch:
    types: [lib-released]
  workflow_dispatch:
    inputs:
      package:
        description: "Full npm package name (e.g. @pivot-platform/collaboratif-ui)"
        required: true
      version:
        description: "Version to pin, without leading v (e.g. 0.4.0)"
        required: true

permissions: read-all

concurrency:
  group: bump-lib
  cancel-in-progress: false

env:
  PACKAGE: ${{ github.event.client_payload.package || inputs.package }}
  VERSION: ${{ github.event.client_payload.version || inputs.version }}

jobs:
  bump:
    name: Bump ${{ github.event.client_payload.package || inputs.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      # contents: read alone doesn't imply packages: read — confirmed 2026-07-09 in
      # release.yml, `npm install` against the private @pivot-platform registry 403s without it.
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install pinned version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install "${PACKAGE}@${VERSION}" --save-exact

      - name: No-op if already pinned to this version
        id: diff
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already at ${PACKAGE}@${VERSION} — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify build still succeeds
        if: steps.diff.outputs.changed == 'true'
        run: npm run build

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "pivot-deps-bot"
          git config user.email "deps-bot@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(deps): bump ${PACKAGE} to ${VERSION} [automated]

          Déclenché par la release ${VERSION} de ${PACKAGE} (repository_dispatch). Ce commit
          re-déclenche deploy-dev.yml pour porter le changement jusqu'à recette."
          git push origin HEAD:main
