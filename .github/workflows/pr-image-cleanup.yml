name: PR image cleanup

# Supprime l'image de preview `pr-<num>` (poussée par pr-checks.yml / job docker-preview)
# quand la PR est fermée ou mergée — pas d'accumulation d'images orphelines dans GHCR.

on:
  pull_request:
    types: [closed]

permissions:
  packages: write

jobs:
  delete-preview-image:
    name: Delete PR preview image
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Same-repo uniquement : une PR de fork n'a jamais poussé d'image (pas de token).
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Delete ghcr preview image pr-<num>
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}
          # Nom de package REST = chemin après l'owner. Image poussée vers
          # ghcr.io/<owner>/pivot-ui/pivot-ui-preview → package "pivot-ui/pivot-ui-preview".
          PKG: pivot-ui/pivot-ui-preview
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PKG_ENC=$(printf '%s' "$PKG" | sed 's#/#%2F#g')
          TAG="pr-${PR}"
          echo "Recherche de la version container taguée ${TAG} dans ${PKG}…"
          # 404 = package inexistant (aucune preview poussée) → cas attendu, sortie propre.
          # Toute AUTRE erreur (403, réseau…) fait échouer le workflow.
          if ! VERSIONS=$(gh api --paginate "/orgs/${ORG}/packages/container/${PKG_ENC}/versions" 2> err.log); then
            if grep -qi "Not Found" err.log; then
              echo "Package ${PKG} absent — rien à nettoyer."
              exit 0
            fi
            echo "Erreur non gérée :" >&2; cat err.log >&2; exit 1
          fi
          IDS=$(printf '%s' "$VERSIONS" | jq -r ".[] | select(.metadata.container.tags[]? == \"${TAG}\") | .id")
          if [ -z "${IDS}" ]; then
            echo "Aucune image ${TAG} (PR sans build de preview, ou déjà supprimée). Rien à faire."
            exit 0
          fi
          for id in ${IDS}; do
            echo "Suppression de la version ${id} (tag ${TAG})"
            gh api -X DELETE "/orgs/${ORG}/packages/container/${PKG_ENC}/versions/${id}"
          done
