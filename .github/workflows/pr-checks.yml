name: PR Checks

# Jobs réservés aux PR (mutation testing Stryker). Sortis de ci.yml afin de NE PAS apparaître
# en "skipped" sur les runs push (main/develop). ISO avec pivot-core.
on:
  pull_request:
    # Même filtre que ci.yml.
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------
  # MUTATION TESTING (Stryker) — indicateur qualité non bloquant (continue-on-error).
  # Job autonome (pas de needs cross-workflow). Rapport uploadé.
  # -----------------------------------------
  mutation:
    name: Mutation Testing (Stryker)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node + npm
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      # Step-level continue-on-error so the job (and PR check) stays green:
      # mutation score is a quality indicator, not a hard merge gate (CLAUDE.md).
      - name: Stryker — mutation coverage
        continue-on-error: true
        run: npx stryker run

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-report
          path: reports/mutation/

  # -----------------------------------------
  # DOCKER PREVIEW — build + scan + push de l'image nginx, MIRROR de la Release.
  # Émet la MÊME catégorie code-scanning `trivy-container` que release.yml (qui ne tourne que
  # sur push main) → la config existe aussi sur les PR (pas de "configuration not found").
  # Image `pivot-ui-preview:pr-<num>` (package SÉPARÉ ≠ prod), supprimée à la fermeture de la
  # PR par pr-image-cleanup.yml. amd64. Same-repo seulement (forks : pas de token GHCR).
  # -----------------------------------------
  docker-preview:
    name: Docker preview image (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write
      security-events: write   # upload du SARIF Trivy (parité avec la Release)

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Mirror de la Release : build & load (pas de push) -> Trivy (gate) -> push.
      - name: Build & load preview image (amd64)
        run: |
          # GHCR exige un nom de dépôt en minuscules ; github.repository contient PIVOT-PLATFORM.
          # Package dédié aux previews (jamais l'image de prod pivot-ui).
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/pivot-ui-preview:pr-${{ github.event.pull_request.number }}"
          echo "PREVIEW_IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          docker buildx build --platform linux/amd64 --load -t "${IMAGE}" .

      - name: Scan preview image - Trivy (gate avant push)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.PREVIEW_IMAGE }}
          format: sarif
          output: trivy-preview.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      # MÊME catégorie que release.yml (trivy-container) → config présente sur PR et main.
      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-preview.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-preview.sarif
          category: trivy-container

      # Atteint uniquement si Trivy a réussi.
      - name: Push preview image (scan OK)
        run: docker push "${PREVIEW_IMAGE}"

      - name: Résumé
        run: |
          echo "Image preview : ${PREVIEW_IMAGE}" >> "$GITHUB_STEP_SUMMARY"
