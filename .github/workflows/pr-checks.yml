name: PR Checks

# Jobs réservés aux PR (mutation testing Stryker). Sortis de ci.yml afin de NE PAS apparaître
# en "skipped" sur les runs push (main/develop). ISO avec pivot-core.
on:
  pull_request:
    # Même filtre que ci.yml.
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------
  # MUTATION TESTING (Stryker) — indicateur qualité non bloquant (continue-on-error).
  # Job autonome (pas de needs cross-workflow). Rapport uploadé.
  # -----------------------------------------
  mutation:
    name: Mutation Testing (Stryker)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node + npm
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      # Step-level continue-on-error so the job (and PR check) stays green:
      # mutation score is a quality indicator, not a hard merge gate (CLAUDE.md).
      - name: Stryker — mutation coverage
        continue-on-error: true
        run: npx stryker run

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-report
          path: reports/mutation/
