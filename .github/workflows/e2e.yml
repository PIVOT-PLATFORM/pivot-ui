name: E2E

# Tests E2E Playwright necessitent pivot-core (API backend) disponible.
# Desactive par defaut — reactiver quand PIVOT_API_URL est fourni via secret.
on:
  workflow_dispatch:
    inputs:
      pivot_api_url:
        description: 'URL API pivot-core (ex: http://staging.pivot.internal:8080)'
        required: false
        default: 'http://localhost:8080'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E - Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Angular (production)
        env:
          PIVOT_API_URL: ${{ inputs.pivot_api_url || secrets.PIVOT_API_URL || 'http://localhost:8080' }}
        run: npm run build -- --configuration production

      - name: Serve Angular build
        run: npx --yes serve dist/pivot-ui/browser -p 4200 --single &

      - name: Run Playwright
        env:
          PIVOT_API_URL: ${{ inputs.pivot_api_url || secrets.PIVOT_API_URL || 'http://localhost:8080' }}
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
