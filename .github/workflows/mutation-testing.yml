name: Mutation Testing

# Stryker en exécution hebdomadaire — sorti de pr-checks.yml où il timeoutait
# régulièrement (30min) et affichait un "fail" sur chaque PR alors qu'il est
# purement indicatif (mutation score, pas un gate de merge — CLAUDE.md).
on:
  schedule:
    - cron: '0 6 * * 1' # Lundi 06:00 UTC (~08:00 Europe/Paris)
  workflow_dispatch: {} # Déclenchement manuel à la demande

permissions: read-all

jobs:
  mutation:
    name: Mutation Testing (Stryker)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node + npm
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      - name: Stryker — mutation coverage
        run: npx stryker run

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-report
          path: reports/mutation/
