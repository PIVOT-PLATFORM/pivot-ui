name: Lighthouse

# DESACTIVE - pas d'URL deployee. Reactiver quand PIVOT_APP_URL disponible.
on:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI - Perf & Accessibilite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (production)
        env:
          PIVOT_API_URL: ${{ secrets.PIVOT_API_URL || 'http://localhost:8080' }}
        run: npm run build -- --configuration production

      - name: Serve Angular build
        run: |
          npx http-server dist/pivot-ui/browser -p 4200 --silent &
          sleep 3

      - name: Install Chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: setup-chrome

      - name: Run Lighthouse CI
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          npx lhci autorun
          npx lhci upload --target=filesystem --outputDir=./lighthouse-reports || true

      - name: Lighthouse - resume agrege
        if: always()
        run: |
          echo "## Lighthouse CI - Resultats PIVOT-UI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Page | Perf | A11y | Bonnes pratiques | SEO |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|------------------|-----|" >> $GITHUB_STEP_SUMMARY
          for f in $(find lighthouse-reports -name "lhr-*.json" 2>/dev/null); do
            [ -f "$f" ] || continue
            url=$(jq -r '.finalUrl' "$f")
            perf=$(jq -r '(.categories.performance.score // 0) * 100 | round | tostring' "$f")
            a11y=$(jq -r '(.categories.accessibility.score // 0) * 100 | round | tostring' "$f")
            bp=$(jq -r '(.categories["best-practices"].score // 0) * 100 | round | tostring' "$f")
            seo=$(jq -r '(.categories.seo.score // 0) * 100 | round | tostring' "$f")
            echo "| $url | ${perf}% | ${a11y}% | ${bp}% | ${seo}% |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: lighthouse-report
          path: lighthouse-reports/
          retention-days: 7
