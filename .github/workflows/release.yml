name: Release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  # -----------------------------------------
  # 0. CHECK RELEASE TRIGGER — le trailer doit apparaître comme une LIGNE ENTIÈRE et EXACTE
  #    du message de commit (`grep -qxE`, pas une sous-chaîne `contains()`). Sans cette
  #    exactitude, toute prose qui *mentionne* le trailer (doc, PR décrivant la fonctionnalité,
  #    ce fichier lui-même) le fait matcher par accident — vécu en pratique le 2026-07-06 côté
  #    pivot-core : le commit introduisant cette règle citait le trailer dans sa description et
  #    a lui-même déclenché `prepare` (sauvé par hasard : commit `docs:`, aucune version
  #    calculée par semantic-release pour ce type). Le trailer réel doit être posé seul sur sa
  #    propre ligne, rien d'autre — voir pivot-ui/CLAUDE.md, Workflow — Release.
  # -----------------------------------------
  check-release-trigger:
    name: Check release trigger
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    outputs:
      trigger: ${{ steps.check.outputs.trigger }}
    permissions:
      contents: read
    steps:
      - name: Check for exact Release-Trigger trailer line
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s\n' "$COMMIT_MSG" | grep -qxE 'Release-Trigger: true'; then
            echo "trigger=true" >> "$GITHUB_OUTPUT"
          else
            echo "trigger=false" >> "$GITHUB_OUTPUT"
          fi

  # -----------------------------------------
  # 1. PREPARE — calcule la version SANS créer la release (dry-run), avec des permissions
  #    MINIMALES (contents: read). ISO pivot-core.
  # -----------------------------------------
  prepare:
    name: Compute release version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [check-release-trigger]
    if: needs.check-release-trigger.outputs.trigger == 'true'
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      # EN17.10 — @pivot-platform/collaboratif-ui (private GitHub Packages) is a real
      # package.json dependency npm needs to read on install; GITHUB_TOKEN otherwise gets a
      # 403 in this job even with NODE_AUTH_TOKEN set (confirmed 2026-07-09) — contents: read
      # alone doesn't imply packages: read.
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Semantic Release
        env:
          # EN17.10 — package.json already lists the private @pivot-platform/collaboratif-ui
          # dependency; npm reconciles the full lockfile on any `npm install`, even one only
          # adding devDependencies, so it still needs registry auth here. Missing before this
          # fix — the "release" job's own "Install dependencies" step (npm ci) already sets
          # this same var, this "prepare" job's install never did.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: Compute next version (dry-run)
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release --dry-run

  # -----------------------------------------
  # 2. RELEASE — build à la version finale, scan AVANT push, publie l'image,
  #    PUIS crée la release/tag. Ne tourne que si `prepare` a déterminé une version.
  #
  #    SLSA L3 : id-token et attestations sont ABSENTS de ce job (le build ne peut
  #    pas forger sa propre provenance). Ils sont accordés uniquement au job
  #    provenance-container.
  # -----------------------------------------
  release:
    name: Build, scan, publish & release
    runs-on: ubuntu-latest
    needs: [prepare]
    if: needs.prepare.outputs.version != ''
    timeout-minutes: 30
    outputs:
      image:  ${{ steps.build-docker.outputs.image_name }}
      digest: ${{ steps.push.outputs.digest }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      security-events: write
      # id-token et attestations : accordés UNIQUEMENT au job de provenance (SLSA L3).

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # EN17.10 — @pivot-platform/collaboratif-ui is now a real dependency (private
          # GitHub Packages registry, see .npmrc); npm ci needs read auth for it too.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Semantic Release
        run: npm install --save-dev semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Build ui-core library
        run: npm run build:ui-core

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & load Docker image (amd64)
        id: build-docker
        env:
          # EN17.10 — le Dockerfile installe désormais @pivot-platform/collaboratif-ui
          # (registre privé GitHub Packages) ; secret BuildKit, jamais un --build-arg.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # NOT "${GITHUB_REPOSITORY,,}/pivot-ui" — GITHUB_REPOSITORY is already
          # "PIVOT-PLATFORM/pivot-ui"; appending the repo name again doubled the path segment
          # (ghcr.io/pivot-platform/pivot-ui/pivot-ui), which nothing that consumes this image
          # (docker-compose.prod.yml: ghcr.io/pivot-platform/pivot-ui:*) can ever resolve.
          # Same bug, same fix as pivot-core's release.yml (confirmed empirically 2026-07-09
          # deploying a real instance — every previously published image only exists at the
          # doubled path).
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "IMAGE_REF=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          # Stable semver tag, in addition to GITHUB_SHA — matches pivot-core's
          # release.yml (EN07.5) and closes the gap EN07.5's own spec flagged for pivot-ui
          # ("a le même gap (pas de tag semver)"). No `latest` tag: forbidden for deployment
          # targeting by .plumber.yaml (containerImageMustNotUseForbiddenTags) — deploy.yml
          # already pins on ${VERSION} exclusively, so `latest` was pure unused residue (#146).
          echo "IMAGE_VERSION=${IMAGE}:${VERSION}" >> "$GITHUB_ENV"
          echo "image_name=${IMAGE}" >> "$GITHUB_OUTPUT"
          docker buildx build --platform linux/amd64 --load \
            --secret id=npm_token,env=NODE_AUTH_TOKEN \
            -t "${IMAGE}:${GITHUB_SHA}" \
            -t "${IMAGE}:${VERSION}" \
            .

      - name: Scan Docker image - Trivy (gate avant push)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: sarif
          output: trivy-ui.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-ui.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: trivy-ui.sarif
          category: trivy-container

      - name: Push Docker image (scan OK)
        id: push
        run: |
          docker push "${IMAGE_REF}"
          PUSH_OUT=$(docker push "${IMAGE_VERSION}" 2>&1)
          printf '%s\n' "${PUSH_OUT}"
          DIGEST=$(printf '%s\n' "${PUSH_OUT}" | grep -oE 'sha256:[a-f0-9]{64}' | tail -1)
          if [ -z "${DIGEST}" ]; then
            echo "::error::Digest introuvable après push — impossible d'attester l'image (SLSA L3)."
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Set @pivot-platform/ui-core package version
        run: npm --prefix dist/ui-core version "$VERSION" --no-git-tag-version

      - name: Publish @pivot-platform/ui-core to GitHub Packages
        # Same version as the Docker image tag above ($VERSION, from `prepare`'s semantic-release
        # dry-run) — published BEFORE the tag/release is created below, mirroring pivot-core's
        # release.yml (Maven `deploy_jar`) and pivot-collaboratif-ui's release.yml (same fix,
        # #77). Fixes the library staying frozen at 0.1.0 forever: the previous separate
        # publish-ui-core.yml relied on `on: push: tags: [...]`, which never fires —
        # semantic-release creates tags/releases via the GitHub REST API, not `git push --tags`,
        # so no `push` event on refs/tags/* is ever emitted (confirmed via GitHub Packages: 0.1.0
        # was the only version ever published despite 28 tags up to v0.28.0; every historical run
        # of "Publish @pivot-platform/ui-core" fired on `push`/`main`, never `tags`, and its
        # gated "Publish to GitHub Packages" step always showed `skipped`). Idempotent
        # (409/already-exists tolerated) for safe re-runs.
        run: |
          if npm view "@pivot-platform/ui-core@${VERSION}" version 2>/dev/null; then
            echo "::notice::${VERSION} already published — skipping (idempotent re-run)."
          else
            npm publish ./dist/ui-core
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semantic Release (create tag + release)
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release

  # -----------------------------------------
  # 3. PROVENANCE CONTAINER — génère et signe la provenance SLSA L3 pour l'image Docker.
  #    id-token: write est ici, pas dans `release` → le build ne peut pas forger sa
  #    propre provenance (différence clé L2 → L3).
  #    Attache l'attestation en tant qu'artefact OCI dans GHCR via cosign.
  #
  # -----------------------------------------
  provenance-container:
    name: SLSA provenance — Docker (L3)
    needs: [release]
    permissions:
      id-token: write
      packages: write
      actions: read
    # Réf en TAG (@v2.1.0) et NON en SHA : avec compile-generator: false le binaire est
    # téléchargé depuis la Release au ref détecté par detect-env (via OIDC job_workflow_ref).
    # builder-fetch.sh exige refs/tags/vX.Y.Z ; un SHA brut → exit 2 → binaire absent →
    # exit 127 → upload-artifact sans chemin → SUCCESS=false → échec final 27.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.release.outputs.image }}
      digest: ${{ needs.release.outputs.digest }}
    secrets:
      # registry-username + registry-password : noms attendus par generator_container_slsa3.yml
      # (slsa-framework/slsa-github-generator v2.1.0, utilise docker/login-action en interne).
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # Le déploiement prod vit dans deploy.yml, déclenché `on: release: published` (event-based)
  # → jamais "skipped", et conserve `environment: production`.
