name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Lundi 6h UTC

permissions: read-all

jobs:
  # -----------------------------------------
  # SECRETS — Gitleaks
  # -----------------------------------------
  gitleaks:
    name: Gitleaks - Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENCE_KEY }}
          GITLEAKS_CONFIG: .github/workflows/configuration/.gitleaks.toml

  # -----------------------------------------
  # SAST — CodeQL (JavaScript / TypeScript)
  # -----------------------------------------
  codeql:
    name: CodeQL - SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: javascript
          config-file: .github/codeql/config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4

  # -----------------------------------------
  # SAST — Semgrep (OWASP + JS/TS + XSS)
  # -----------------------------------------
  semgrep:
    name: Semgrep - SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # requis par upload-sarif

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python (Semgrep CLI)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep Scan
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/xss \
            --config p/secrets \
            --sarif --output semgrep-results.sarif \
            src || true
          FINDINGS=$(jq '.runs[0].results | length' semgrep-results.sarif)
          echo "Semgrep findings (non-suppressed): $FINDINGS"
          if [ "$FINDINGS" -gt 0 ]; then
            jq -r '.runs[0].results[] | "[\(.ruleId)] \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine // "?") -- \(.message.text[0:300])"' semgrep-results.sarif
            exit 1
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('semgrep-results.sarif') != ''
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep-sast

  # -----------------------------------------
  # CI/CD CONFORMITE — Plumber
  # -----------------------------------------
  plumber:
    name: Plumber - CI/CD Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run Plumber
        uses: getplumber/plumber@a0658c7fbd82163d75803cce492d18e50ef71afd # v0.3.68
        with:
          sarif: plumber-results.sarif
          output: plumber-results.json
          pbom-cyclonedx: plumber-pbom.cdx.json
          # Politique projet = 90% (defaut action = 100%).
          threshold: 90
          # Token lecture public-repo pour resoudre les versions d'actions tierces
          # (org IP allow list bloque sinon, 403). Optionnel.
          metadata-token: ${{ secrets.PLUMBER_METADATA_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.PLUMBER_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload Plumber SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('plumber-results.sarif') != ''
        with:
          sarif_file: plumber-results.sarif
          category: plumber-supply-chain

      - name: Upload Plumber artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always() && hashFiles('plumber-results.json') != ''
        with:
          name: plumber-report
          path: |
            plumber-results.json
            plumber-pbom.cdx.json

      - name: Plumber Gate (conformite >= 90% requise)
        if: hashFiles('plumber-results.json') != ''
        run: |
          SCORE=$(jq '.compliance' plumber-results.json)
          echo "Plumber compliance: ${SCORE}%"
          if [ "$SCORE" -lt 90 ]; then
            echo "::error::Plumber compliance ${SCORE}% < 90%% (security gate)"
            exit 1
          fi
