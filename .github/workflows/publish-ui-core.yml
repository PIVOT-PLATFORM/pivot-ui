name: Publish @pivot-platform/ui-core

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

concurrency:
  group: publish-ui-core-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish @pivot-platform/ui-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@pivot-platform'

      - name: Install dependencies
        run: npm ci
        env:
          # EN17.10 — @pivot-platform/collaboratif-ui is now a real dependency (private
          # GitHub Packages registry, see .npmrc); npm ci needs read auth for it too.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ui-core library
        run: npm run build:ui-core

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm --prefix dist/ui-core version "$VERSION" --no-git-tag-version

      - name: Publish to GitHub Packages
        run: npm publish ./dist/ui-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
