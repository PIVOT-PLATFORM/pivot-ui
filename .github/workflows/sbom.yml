name: SBOM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: read-all

jobs:
  sbom:
    name: SBOM - CycloneDX (npm)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (sans scripts)
        run: npm ci --ignore-scripts

      - name: Generate SBOM - Frontend (npm CycloneDX)
        run: |
          npm sbom \
            --omit dev \
            --package-lock-only \
            --sbom-format cyclonedx \
            --sbom-type application \
            > sbom-frontend.cdx.json

      - name: Fetch previous release SBOM (diff)
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(gh release list --limit 2 --json tagName --jq '.[1].tagName // ""')
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV_TAG" ]; then
            gh release download "$PREV_TAG" \
              --pattern "sbom-frontend.cdx.json" \
              --output sbom-frontend-prev.cdx.json 2>/dev/null \
              && echo "prev_frontend=true" >> "$GITHUB_OUTPUT" \
              || echo "prev_frontend=false" >> "$GITHUB_OUTPUT"
          else
            echo "prev_frontend=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff SBOM vs release precedente
        env:
          PREV_FRONTEND: ${{ steps.prev.outputs.prev_frontend }}
          PREV_TAG: ${{ steps.prev.outputs.prev_tag }}
        run: |
          python3 - <<'PYEOF'
          import json, os

          def load(path):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  return {c['name']: c.get('version', '?') for c in data.get('components', [])}
              except Exception:
                  return {}

          def diff_report(label, prev_path, curr_path, out):
              prev = load(prev_path)
              curr = load(curr_path)
              if not prev:
                  return
              added   = {k: curr[k] for k in curr if k not in prev}
              removed = {k: prev[k] for k in prev if k not in curr}
              changed = {k: (prev[k], curr[k]) for k in curr if k in prev and curr[k] != prev[k]}
              tag = os.environ.get("PREV_TAG", "previous release")
              out.write(f'## {label} SBOM diff (vs {tag})\n\n')
              if not (added or removed or changed):
                  out.write('Aucun changement de dependances.\n\n')
                  return
              for k, v in sorted(added.items()):
                  out.write(f'+ {k}  {v}\n')
              for k, v in sorted(removed.items()):
                  out.write(f'- {k}  {v}\n')
              for k, (o, n) in sorted(changed.items()):
                  out.write(f'~ {k}  {o} -> {n}\n')
              out.write('\n')

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/stdout')
          with open(summary_path, 'a') as out:
              if os.environ.get('PREV_FRONTEND') == 'true':
                  diff_report('Frontend (Angular/npm)', 'sbom-frontend-prev.cdx.json', 'sbom-frontend.cdx.json', out)
          PYEOF

      - name: Upload SBOM as CI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.event.release.tag_name || github.sha }}
          path: sbom-frontend.cdx.json
          retention-days: 365

      - name: Attach SBOM to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            sbom-frontend.cdx.json \
            --clobber
