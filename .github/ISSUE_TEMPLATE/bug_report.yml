name: Bug Report
description: Signaler un bug dans PIVOT-UI
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module concerné
      options:
        - core
        - whiteboard
        - session
        - roadmap
        - survey
        - quiz
        - auth
        - admin
        - ci-cd
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Sévérité
      options:
        - Critical — sécurité compromise / données exposées
        - High — fonctionnalité bloquée
        - Medium — fonctionnalité dégradée
        - Low — cosmétique / mineur
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Description claire et concise du bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes de reproduction
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Observer l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Comportement observé
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environnement
      placeholder: |
        - OS :
        - Navigateur + version :
        - Version PIVOT :
        - Résolution / device :

  - type: textarea
    id: logs
    attributes:
      label: Console / Screenshots
      description: Coller les erreurs console ou attacher des captures d'écran
