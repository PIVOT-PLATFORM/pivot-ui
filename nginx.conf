# EN04.4 — upstream pool for the pivot-core API backend, with passive health checking.
upstream pivot_core_backend {
    # `zone`: shared-memory zone so the failure counters below are shared across all nginx
    # worker processes (this base image, nginx:alpine, defaults to `worker_processes auto` —
    # one per CPU core — in its own /etc/nginx/nginx.conf, not overridden by this file).
    # Without `zone`, each worker keeps its own independent counter, and `max_fails` would then
    # need to be hit on EVERY worker independently before the server is actually taken out —
    # see https://nginx.org/en/docs/http/ngx_http_upstream_module.html. Free/open-source
    # directive since nginx 1.9.0, not an nginx Plus feature.
    zone pivot_core_zone 64k;
    # Passive health check (nginx OSS has no active probe directive — that is nginx Plus
    # only): after `max_fails` failed proxy attempts within the `fail_timeout` window, this
    # server is marked unavailable for the rest of that window instead of being retried on
    # every single request.
    #
    # NOTE — today this upstream has a single server: pivot-core is the only backend behind
    # this prefix (the module-core services this Enabler's own compose file already earmarks
    # for future pilotage/agilite/collaboratif prefixes don't exist as repos yet — see
    # docker-compose.prod.yml in pivot-core). Per nginx's own documented behavior, "if there
    # is only a single server in a group, max_fails/fail_timeout/slow_start are ignored, and
    # such a server will never be considered unavailable" (nginx.org,
    # ngx_http_upstream_module) — so this directive is inert until a second server joins the
    # pool (a scaled pivot-core replica, or a real module-core service). It is still specified
    # here, exactly as this Enabler's AC asks, because it is what takes effect the moment that
    # second server exists — nothing to redo then. The 503-on-failure behavior in the `/api/`
    # location below does NOT depend on `max_fails` triggering, though: it fires on every
    # individual failed request regardless of replica count, which is what actually makes the
    # "module KO → 503" scenario observable today with a single backend.
    server backend:8080 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # i18n JSON — no cache (updated on each deploy)
    # Security headers repeated: nginx does not inherit parent add_header in child locations
    # that define their own add_header directives.
    location ~* /assets/i18n/.*\.json$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        expires 0;
        try_files $uri =404;
    }

    # JS/CSS chunks — long cache (content-hashed by Angular build)
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://pivot_core_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # EN04.4 — fail fast rather than nginx's 60s connect/read/send timeout defaults: a
        # stuck or unreachable backend should trip the 503 response (and the passive upstream
        # failure counter above) within a few seconds, not a minute — matches the 5s timeout
        # already used throughout docker-compose.prod.yml's own healthchecks (pivot-core repo).
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        # EN04.4 — nginx only applies error_page to upstream response codes when explicitly
        # told to (by default it only rewrites its own internally generated errors);
        # `proxy_intercept_errors on` extends that to the two codes nginx itself produces for
        # a dead/unreachable backend — 502 (connection refused/reset) and 504 (timeout) — and
        # `error_page` remaps both to the named location below, which forces a 503 Service
        # Unavailable: the status code a client or monitoring probe should actually branch on
        # for "temporary, retry later" (a raw 502 doesn't carry that meaning as clearly, and
        # would conflate "bad gateway" with "backend deliberately unavailable").
        proxy_intercept_errors on;
        error_page 502 504 @api_unavailable;
    }

    # EN04.4 — see `location /api/` above: reached only when the pivot-core backend is
    # unreachable or times out.
    location @api_unavailable {
        default_type application/json;
        return 503 '{"status":"DOWN"}';
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;
}
