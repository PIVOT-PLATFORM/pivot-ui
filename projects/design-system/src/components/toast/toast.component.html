<div class="toast-container">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="toast"
      [class.toast--success]="toast.type === 'success'"
      [class.toast--warning]="toast.type === 'warning'"
      [class.toast--error]="toast.type === 'error'"
      [attr.role]="toast.type === 'error' || toast.type === 'warning' ? 'alert' : 'status'"
      [attr.data-testid]="'toast-' + toast.type"
    >
      <p class="toast__message">{{ toast.messageKey | transloco: toast.params }}</p>
      @if (toast.action) {
        <a
          class="toast__action"
          [routerLink]="toast.action.route"
          (click)="toastService.dismiss(toast.id)"
          >{{ toast.action.labelKey | transloco }}</a
        >
      }
      <button
        type="button"
        class="toast__close"
        (click)="toastService.dismiss(toast.id)"
        [attr.aria-label]="'common.close' | transloco"
      >
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
  }
</div>
