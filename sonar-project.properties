sonar.projectKey=PIVOT-PLATFORM_pivot-ui
sonar.organization=pivot-platform
sonar.projectName=pivot-ui

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Chemin principal (vitest.config.ts reportsDirectory=./coverage) + fallback
# si @angular/build:unit-test sort dans coverage/<projectName>/
sonar.javascript.lcov.reportPaths=coverage/lcov.info,coverage/frontend/lcov.info

sonar.exclusions=**/node_modules/**,dist/**,coverage/**,**/*.spec.ts
sonar.test.exclusions=**/node_modules/**,dist/**
sonar.coverage.exclusions=**/node_modules/**,dist/**,coverage/**,**/*.spec.ts,**/app.routes.ts,**/app.config.ts,**/environments/**

sonar.sourceEncoding=UTF-8
